<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N7R 业务看板</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F9F9F8; --bg2:#F2F2F0; --surface:#FFFFFF;
  --border:rgba(0,0,0,0.08); --border2:rgba(0,0,0,0.05);
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.09),0 20px 48px rgba(0,0,0,.07);
  --t1:#1A1A1A; --t2:#3D3D3D; --t3:#737373; --t4:#ABABAB;
  --accent:#D97706; --accent-bg:rgba(217,119,6,.08);
  --green:#16A34A;  --green-bg:rgba(22,163,74,.09);
  --red:#DC2626;    --red-bg:rgba(220,38,38,.09);
  --orange:#EA580C; --orange-bg:rgba(234,88,12,.09);
  --blue:#2563EB;   --blue-bg:rgba(37,99,235,.09);
  --purple:#7C3AED; --purple-bg:rgba(124,58,237,.09);
  --teal:#0891B2;   --teal-bg:rgba(8,145,178,.09);
  --pink:#DB2777;   --pink-bg:rgba(219,39,119,.09);
  --gold:#B45309;   --gold-bg:rgba(180,83,9,.09);
  --amt-total:#B45309; --amt-paid:#16A34A; --amt-due:#DC2626;
  --r:14px; --rs:10px; --rx:7px;
  --f:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Noto Sans SC","Microsoft YaHei UI","Microsoft YaHei","Hiragino Sans GB",Arial,sans-serif;
  --fm:"SF Mono","Menlo","Monaco","Consolas","Liberation Mono",monospace;
}
body{font-family:var(--f);background:var(--bg);color:var(--t1);min-height:100vh;font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:3px}
input,textarea,select{outline:none;font-family:var(--f)}
input:focus,textarea:focus{border-color:var(--accent)!important}

/* ── HEADER ── */
header{position:sticky;top:0;z-index:300;background:rgba(249,249,248,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:14px}
.logo-chip{background:linear-gradient(135deg,#1A1A1A,#444);border-radius:9px;padding:5px 12px;font-family:var(--fm);font-size:15px;font-weight:700;color:#fff;letter-spacing:1.5px}
.logo-title{font-size:28px;font-weight:800;color:var(--t1);letter-spacing:-.6px}
.logo-sep{width:1px;height:22px;background:var(--border);margin:0 2px}
.logo-sub{font-size:13px;color:var(--t3)}
.hdr-r{display:flex;align-items:center;gap:12px}
.hdr-date{font-size:13px;color:var(--t3);font-weight:500}
.sync-meta{font-size:12px;color:var(--t4)}
.sync-btn{display:flex;align-items:center;gap:7px;padding:8px 18px;background:var(--surface);border:1px solid var(--border);border-radius:22px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;font-family:var(--f);transition:all .15s;box-shadow:var(--shadow)}
.sync-btn:hover{border-color:var(--accent);color:var(--accent)}
.sync-btn.loading{opacity:.5;pointer-events:none}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0}
.dot.err{background:var(--red)}.dot.spin{background:var(--orange);animation:blink .5s infinite alternate}
@keyframes blink{to{opacity:.2}}

/* ── NAV ── */
nav{position:sticky;top:64px;z-index:200;background:rgba(249,249,248,.93);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:0 24px;display:flex;overflow-x:auto}
nav::-webkit-scrollbar{display:none}
nav button{padding:13px 18px;font-size:14.5px;font-weight:500;color:var(--t3);border:none;background:none;cursor:pointer;white-space:nowrap;font-family:var(--f);border-bottom:2.5px solid transparent;transition:all .14s}
nav button.active{font-weight:700;color:var(--accent);border-bottom-color:var(--accent)}
nav button:hover:not(.active){color:var(--t1)}

/* ── MAIN ── */
main{padding:28px 32px;max-width:1600px;margin:0 auto;width:100%}

/* ── KPI ── */
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.kpi{background:var(--surface);border-radius:var(--r);padding:22px 24px;border:1px solid var(--border);box-shadow:var(--shadow)}
.kpi-l{font-size:12px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.6px}
.kpi-v{font-size:32px;font-weight:800;margin-top:10px;line-height:1;letter-spacing:-.5px}
.kpi-s{font-size:12.5px;color:var(--t4);margin-top:7px}

/* ── SECTION ── */
.sec{margin-top:28px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.sec-title{font-size:17px;font-weight:700;color:var(--t1);letter-spacing:-.2px}
.sec-more{font-size:13px;color:var(--accent);font-weight:600;background:none;border:none;cursor:pointer;font-family:var(--f);padding:5px 12px;border-radius:22px;transition:background .14s}
.sec-more:hover{background:var(--accent-bg)}

/* ── CARD ── */
.card{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow);overflow:hidden}
.card-p{padding:20px 22px}

/* ── SUB-TABS ── */
.stabs{display:flex;border-bottom:1px solid var(--border)}
.stab{padding:11px 20px;font-size:14px;font-weight:500;color:var(--t3);border:none;border-bottom:2.5px solid transparent;background:none;cursor:pointer;font-family:var(--f);transition:all .14s}
.stab.on{color:var(--accent);font-weight:700;border-bottom-color:var(--accent)}

/* ── PILLS ── */
.pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.pill{padding:6px 16px;font-size:13.5px;font-weight:500;border-radius:22px;border:1px solid var(--border);background:var(--surface);color:var(--t3);cursor:pointer;font-family:var(--f);transition:all .14s;box-shadow:var(--shadow)}
.pill.on{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600}
.pill:hover:not(.on){color:var(--t1);border-color:rgba(0,0,0,.15)}

/* ── TABLE ── */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:14px;font-family:var(--f)}
thead tr{background:var(--bg2)}
th{padding:10px 16px;text-align:left;font-size:11px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.6px;border-bottom:1px solid var(--border);white-space:nowrap}
td{padding:12px 16px;border-bottom:1px solid var(--border2);vertical-align:middle;color:var(--t2);font-size:14px}
tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(0,0,0,.015)}
.empty{color:var(--t4);font-style:italic;padding:26px 16px!important;text-align:center;font-size:14px}

/* ── GROUP ROWS ── */
.gr{cursor:pointer;user-select:none}
.gr td{background:rgba(0,0,0,.02);border-top:1.5px solid var(--border);border-bottom:1px solid var(--border)!important;padding-top:13px;padding-bottom:13px}
.gr:hover td{background:rgba(217,119,6,.04)!important}
.gr.open td{background:rgba(217,119,6,.03)!important}
.arr{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:6px;background:var(--bg2);color:var(--t3);font-size:10px;margin-right:10px;transition:transform .2s,background .15s,color .15s;vertical-align:middle;flex-shrink:0}
.gr.open .arr{transform:rotate(90deg);background:var(--accent-bg);color:var(--accent)}
.ono{font-family:var(--fm);font-size:15px;font-weight:700;color:var(--t1);letter-spacing:.4px;vertical-align:middle}
.dr td{background:var(--bg);padding-top:9px;padding-bottom:9px;font-size:13px;color:var(--t3);border-bottom:1px solid var(--border2)!important}
.dr td:first-child{padding-left:52px}
.ship-lbl td{background:rgba(37,99,235,.04)!important;padding-top:7px!important;padding-bottom:5px!important}
.ship-lbl td:first-child{padding-left:52px}
.ship-row td{background:rgba(37,99,235,.02)!important;font-size:13px;border-top:1px dashed var(--border2)!important}
.ship-row td:first-child{padding-left:52px}

/* ── BADGE ── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:22px;font-size:12.5px;font-weight:600;white-space:nowrap}
.itag{font-size:10.5px;padding:1px 7px;border-radius:4px;font-weight:700;margin-left:5px;vertical-align:middle}

/* ── AMOUNTS ── */
.amt{font-family:var(--fm);font-variant-numeric:tabular-nums;white-space:nowrap}
.cod{font-family:var(--fm);font-size:13px;letter-spacing:.2px}
.nw{white-space:nowrap} .wrap{max-width:200px;word-break:break-word;white-space:normal;line-height:1.45}
.fw8{font-weight:800}.fw7{font-weight:700}.fw6{font-weight:600}

/* ── PAGE HEADER ── */
.phdr{margin-bottom:24px}
.pt{font-size:24px;font-weight:800;letter-spacing:-.4px}
.ps{font-size:14px;color:var(--t3);margin-top:4px}

/* ── ERROR ── */
.err{background:var(--red-bg);border:1px solid rgba(220,38,38,.2);border-radius:var(--rs);padding:13px 18px;color:var(--red);font-size:14px;margin-bottom:16px;font-weight:500}

/* ── FORM ── */
.fl{font-size:11.5px;font-weight:600;color:var(--t3);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.5px}
.fi{width:100%;padding:10px 13px;background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rx);color:var(--t1);font-size:14px;font-family:var(--f);transition:border .14s}
.fi:focus{border-color:var(--accent)}
.fi-sm{padding:8px 11px;font-size:13px}

/* ── BUTTONS ── */
.btn{padding:10px 22px;border-radius:22px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--f);border:none;transition:all .14s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{opacity:.88}
.btn-ghost{background:var(--surface);color:var(--t2);border:1px solid var(--border);box-shadow:var(--shadow)}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:6px 14px;font-size:12.5px;font-weight:600;border-radius:20px;border:none;cursor:pointer;font-family:var(--f)}
.btn-success{background:var(--green-bg);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.btn-danger{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.btn-info{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(37,99,235,.2)}
.btn-muted{background:var(--bg2);color:var(--t3);border:1px solid var(--border)}
.btn:disabled,.btn-sm:disabled{opacity:.5;pointer-events:none}

/* ── SCANNER / DROPZONE ── */
.dropzone{border:2px dashed var(--border);border-radius:var(--rs);padding:28px 20px;text-align:center;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:120px;background:var(--bg2)}
.dropzone:hover,.dropzone.drag{border-color:var(--accent);background:var(--accent-bg)}
.dropzone-icon{font-size:32px;margin-bottom:8px}
.dropzone-txt{font-size:14px;color:var(--t3)}
.dropzone-txt b{color:var(--accent)}

/* ── SCANNER PANEL ── */
.scan-layout{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start}
.scan-preview{border-radius:var(--rs);overflow:hidden;border:1px solid var(--border);background:var(--bg2);aspect-ratio:4/3;display:flex;align-items:center;justify-content:center}
.scan-preview img{width:100%;height:100%;object-fit:contain}
.scan-preview-empty{color:var(--t4);font-size:13px}
.tgt-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.tgt-btn{padding:10px 8px;border-radius:var(--rs);border:2px solid var(--border);background:var(--surface);cursor:pointer;text-align:center;transition:all .14s;font-family:var(--f)}
.tgt-btn:hover{border-color:rgba(0,0,0,.15)}
.tgt-btn.sel{background:var(--accent-bg);border-color:var(--accent)}
.tgt-icon{font-size:20px;margin-bottom:4px}
.tgt-label{font-size:12px;font-weight:700;color:var(--t2)}
.tgt-desc{font-size:11px;color:var(--t4);margin-top:2px}
.map-row{display:grid;grid-template-columns:100px 1fr;gap:10px;margin-bottom:8px;align-items:center}
.map-key{font-size:12px;font-weight:600;color:var(--t3)}
.result-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.result-cell{padding:8px 10px;background:var(--bg2);border-radius:var(--rx);border:1px solid var(--border)}
.result-cell-k{font-size:10px;color:var(--t4);margin-bottom:2px}
.result-cell-v{font-size:13px;font-weight:600;color:var(--t1)}

/* ── HISTORY CARDS ── */
.hist-card{background:var(--surface);border-radius:var(--rs);border:1px solid var(--border);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;cursor:pointer;transition:box-shadow .14s}
.hist-card:hover{box-shadow:var(--shadow-lg)}
.hist-header{display:flex;align-items:center;justify-content:space-between;padding:13px 16px}
.hist-body{padding:0 16px 14px;border-top:1px solid var(--border2)}
.hist-preview{font-size:12px;color:var(--t3);padding:8px 16px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ── MODAL OVERLAY ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.3);backdrop-filter:blur(4px);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--surface);border-radius:var(--r);border:1px solid var(--border);box-shadow:var(--shadow-lg);width:100%;max-width:560px;max-height:88vh;overflow:auto;padding:28px}
.modal-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:18px;font-weight:800}
.modal-close{background:none;border:none;font-size:20px;color:var(--t3);cursor:pointer;padding:2px 6px;border-radius:6px}
.modal-close:hover{background:var(--bg2)}

/* ── MSG / NOTICE ── */
.notice{border-radius:var(--rs);padding:11px 15px;font-size:13.5px;font-weight:500;margin-top:12px}
.notice.ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(22,163,74,.2)}
.notice.fail{background:var(--red-bg);color:var(--red);border:1px solid rgba(220,38,38,.2)}
.notice.warn{background:var(--accent-bg);color:var(--accent);border:1px solid rgba(217,119,6,.2)}

/* ── SETTINGS ── */
.cfg-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:24px;margin-bottom:16px;box-shadow:var(--shadow)}
.cfg-title{font-size:16px;font-weight:700;margin-bottom:16px}

@media(max-width:900px){.scan-layout{grid-template-columns:1fr}.g4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.g4,.g3,.g2{grid-template-columns:1fr}main,header{padding-left:16px;padding-right:16px}nav{padding:0 12px}.tgt-grid{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-chip">N7R</div>
    <span class="logo-title">N7R 业务看板</span>
    <div class="logo-sep"></div>
    <span class="logo-sub">飞书实时同步</span>
  </div>
  <div class="hdr-r">
    <span class="hdr-date" id="d-date"></span>
    <span class="sync-meta" id="d-sync">未同步</span>
    <button class="sync-btn" id="sbtn" onclick="doSync()">
      <span class="dot" id="sdot"></span>刷新数据
    </button>
  </div>
</header>
<nav id="nav"></nav>
<main id="pg"></main>

<script>
/* ══════════════════════════════════════════════
   CONFIG & STORAGE
══════════════════════════════════════════════ */
const CK = 'n7r-cfg-v5';
// Default cfg includes OCR config keys (shared localStorage with standalone tool)
let cfg = {
  workerUrl: 'https://ocr-tool.zhenita.workers.dev',  // dashboard data (GET /api/all etc)
  ocrUrl:    'https://ocr-tool.zhenita.workers.dev',  // OCR extract (POST /) + feishu write (POST /feishu)
};
// Load from new key first, fall back to old OCR tool key
try {
  const s5 = localStorage.getItem(CK);
  const sOcr = localStorage.getItem('n7r-cfg'); // old OCR tool key
  if (s5) cfg = { ...cfg, ...JSON.parse(s5) };
  else if (sOcr) {
    const old = JSON.parse(sOcr);
    if (old.url) { cfg.ocrUrl = old.url; }  // old tool stored as 'url'
    if (old.fs) cfg.fs = old.fs;
  }
} catch(e) {}
const saveC = () => localStorage.setItem(CK, JSON.stringify(cfg));
const wu = p => cfg.workerUrl.replace(/\/$/, '') + p;

// OCR history shared with standalone tool
const getHist = () => { try { return JSON.parse(localStorage.getItem('n7r-hist')) || []; } catch { return []; } };
const saveHist = h => { try { localStorage.setItem('n7r-hist', JSON.stringify(h.slice(0, 50))); } catch {} };

/* ══════════════════════════════════════════════
   DATA
══════════════════════════════════════════════ */
let DB = { products:[], productionOrders:[], bOrders:[], advances:[], shipments:[], invoices:[] };
let lastSync = null, syncing = false;

async function doSync() {
  if (syncing) return;
  syncing = true;
  const btn = document.getElementById('sbtn');
  const dot = document.getElementById('sdot');
  btn.classList.add('loading');
  dot.className = 'dot spin';
  clearErr();
  try {
    const r = await fetch(wu('/api/all'), { cache: 'no-store' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const j = await r.json();
    if (!j.ok) throw new Error(j.error || '数据错误');
    DB = { ...DB, ...j.data };
    lastSync = new Date();
    document.getElementById('d-sync').textContent = '同步 ' + lastSync.toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
    dot.className = 'dot';
    render();
  } catch(e) {
    showErr('同步失败: ' + e.message);
    dot.className = 'dot err';
  } finally {
    syncing = false;
    btn.classList.remove('loading');
  }
}

/* ══════════════════════════════════════════════
   UTILS
══════════════════════════════════════════════ */
const N   = v => parseFloat(v) || 0;
const F   = n => N(n).toLocaleString('zh-CN', { minimumFractionDigits:2, maximumFractionDigits:2 });
const H   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const skuOf = o => o.sku || (o.product ? String(o.product).split(/[\n,\/]/)[0].trim().slice(0,32) : '') || '-';

const BM = {
  '研发中':['var(--blue)','var(--blue-bg)'],'生产中':['var(--orange)','var(--orange-bg)'],
  '已完成':['var(--green)','var(--green-bg)'],'已取消':['var(--red)','var(--red-bg)'],
  '待付款':['var(--orange)','var(--orange-bg)'],'已付款':['var(--green)','var(--green-bg)'],
  '部分付款':['var(--purple)','var(--purple-bg)'],'待生产':['var(--blue)','var(--blue-bg)'],
  '已发货':['var(--green)','var(--green-bg)'],'部分发货':['var(--purple)','var(--purple-bg)'],
  '待开票':['var(--orange)','var(--orange-bg)'],'已开票':['var(--green)','var(--green-bg)'],
  '履约中':['var(--blue)','var(--blue-bg)'],'已完结':['var(--green)','var(--green-bg)'],
  '未还':['var(--red)','var(--red-bg)'],'部分还':['var(--orange)','var(--orange-bg)'],
  '已还清':['var(--green)','var(--green-bg)'],'Zoho':['var(--purple)','var(--purple-bg)'],
  '手动':['var(--t3)','rgba(0,0,0,.07)'],'供应商':['var(--orange)','var(--orange-bg)'],
  '供应商下单':['var(--orange)','var(--orange-bg)'],'客户':['var(--teal)','var(--teal-bg)'],
  '月度报告':['var(--teal)','var(--teal-bg)'],'普通订单':['var(--t3)','rgba(0,0,0,.07)'],
  '收货':['var(--blue)','var(--blue-bg)'],'发货':['var(--green)','var(--green-bg)'],
};
function bdg(s) {
  const [c,bg] = BM[s] || ['var(--t3)','rgba(0,0,0,.07)'];
  return `<span class="badge" style="color:${c};background:${bg}">${H(s||'-')}</span>`;
}
function itag(l,c,bg){ return `<span class="itag" style="background:${bg};color:${c}">${l}</span>`; }
function showErr(m){ let e=document.getElementById('_err'); if(!e){e=document.createElement('div');e.id='_err';e.className='err';document.getElementById('pg').prepend(e);}e.textContent=m; }
function clearErr(){ const e=document.getElementById('_err'); if(e)e.remove(); }

// Scanner state (module-level, persists across renders)
let SC = {
  file: null, preview: null, busy: false,
  result: null, target: null, mapping: null, saving: false, msg: null,
  drag: false,
};

const cfgKey = k => k==='ship_out' ? 'ship_in' : k;

function doMap(key, data) {
  data = data || SC.result;
  SC.target = key;
  if (!data || data.error) { SC.mapping = null; return; }
  const m = {};
  FM[key].forEach(f => {
    if (f.f==='_auto') m[f.t] = f.v;
    else if (f.f==='items' && data.items) m[f.t] = data.items.map(i=>i.item||i.name||i.sku||'').filter(Boolean).join(', ');
    else if (f.f==='totalQty' && data.items) m[f.t] = data.items.reduce((s,i)=>s+(parseFloat(i.qty)||0), 0);
    else if (data.header?.[f.f] !== undefined) m[f.t] = data.header[f.f];
    else if (data[f.f] !== undefined) m[f.t] = data[f.f];
    else m[f.t] = '';
  });
  SC.mapping = m;
}

function autoDetect(d) {
  if (!d || d.error) return;
  const t = JSON.stringify(d).toLowerCase();
  if (t.includes('送货单')||t.includes('delivery note')||t.includes('发货单')||t.includes('出货单')||t.includes('packing list')) return doMap('ship_out', d);
  if (t.includes('收货')||t.includes('入库')||t.includes('到货')||t.includes('goods received')) return doMap('ship_in', d);
  if ((t.includes('付款')||t.includes('转账')||t.includes('垫付')||t.includes('汇款'))&&!t.includes('付款条件')&&!t.includes('payment term')) return doMap('advance', d);
  if ((t.includes('发票')||t.includes('tax invoice')||t.includes('增值税'))&&!t.includes('proforma')) return doMap('invoice', d);
  if (t.includes('sales contract')||t.includes('销售合同')||t.includes('合同')||t.includes('order confirmation')) return doMap('b2b', d);
  if (t.includes('purchase order')||t.includes('采购')||t.includes('报价')||t.includes('quotation')) return doMap('production', d);
}

function buildFields(key, data) {
  const fields = {};
  FM[key].forEach(f => {
    const v = data[f.t];
    if (v === undefined || v === '') return;
    if (f.fs.includes('金额') || f.fs.includes('数量') || f.fs==='数量') {
      const n = parseFloat(String(v).replace(/[,¥$]/g, ''));
      if (!isNaN(n)) fields[f.fs] = n;
    } else fields[f.fs] = String(v);
  });
  return fields;
}

async function compress(file) {
  return new Promise(res => {
    const cv = document.createElement('canvas'), im = new Image();
    im.onload = () => {
      const s = Math.min(1, 1600/im.width);
      cv.width=im.width*s; cv.height=im.height*s;
      cv.getContext('2d').drawImage(im,0,0,cv.width,cv.height);
      cv.toBlob(b=>res(b), 'image/jpeg', 0.85);
    };
    im.src = URL.createObjectURL(file);
  });
}

async function runExtract() {
  if (!SC.file) return;
  SC.busy = true; SC.result = null; SC.msg = null;
  render();
  try {
    const fd = new FormData();
    const f = SC.file;
    if (f.type.startsWith('image/') && f.size > 1e6) fd.append('file', await compress(f), f.name);
    else fd.append('file', f);
    const r = await fetch(cfg.ocrUrl.replace(/\/+$/,''), { method:'POST', body:fd });
    const d = await r.json();
    SC.result = d;
    autoDetect(d);
  } catch(e) { SC.result = { error: e.message }; }
  SC.busy = false;
  render();
}

async function runSaveToFeishu() {
  const key = SC.target, mp = SC.mapping;
  if (!key || !mp) return;
  const ck = cfgKey(key);
  const fs = cfg.fs || {};
  const aid = fs.aid, as = fs.as;
  const fc = fs[ck];
  if (!aid || !as || !fc?.at || !fc?.tid) {
    SC.msg = { fail: '请先在「⚙ 配置」页完成飞书连接配置' }; render(); return;
  }
  SC.saving = true; SC.msg = null; render();
  const wb = cfg.ocrUrl.replace(/\/+$/, '');
  try {
    const res = SC.result;
    const hasItems = res?.items?.length > 1 && (key==='production' || key==='b2b');
    let cr;
    if (hasItems) {
      const records = res.items.map(it => {
        const row = { ...mp };
        row['产品名称'] = it.item||it.name||it.sku||'';
        if (key==='production') row['下单数量'] = it.qty||'';
        else row['数量'] = it.qty||'';
        row['订单金额'] = it.subtotal||it.amount||'';
        return buildFields(key, row);
      });
      const r = await fetch(wb+'/feishu', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({appId:aid,appSecret:as,appToken:fc.at,tableId:fc.tid,records}) });
      cr = await r.json();
      if (cr.code===0) {
        SC.msg = { ok: `${cr.data?.success_count||records.length} 行写入成功 ✓` };
        const h = getHist();
        saveHist([{d:new Date().toISOString(),t:key,f:mp,r:res,rid:`batch-${cr.data?.success_count}`},...h]);
        doSync(); // refresh dashboard data
      } else SC.msg = { fail: cr.msg||'写入失败' };
    } else {
      const fields = buildFields(key, mp);
      const r = await fetch(wb+'/feishu', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({appId:aid,appSecret:as,appToken:fc.at,tableId:fc.tid,fields}) });
      cr = await r.json();
      if (cr.code===0) {
        const rid = cr.data?.record?.record_id;
        SC.msg = { ok: `写入成功 · Record: ${rid}` };
        const h = getHist();
        saveHist([{d:new Date().toISOString(),t:key,f:mp,r:res,rid},...h]);
        doSync();
      } else SC.msg = { fail: cr.msg||'写入失败' };
    }
  } catch(e) { SC.msg = { fail: e.message }; }
  SC.saving = false;
  render();
}

const HIST_OPEN = new Set();
function togHist(i){ HIST_OPEN.has(i)?HIST_OPEN.delete(i):HIST_OPEN.add(i); render(); }

function histCopy(i){
  const x=getHist()[i]; if(!x) return;
  const l=[];
  Object.entries(x.f||{}).forEach(([k,v])=>{ if(v) l.push(`${k}: ${v}`); });
  if(x.r?.items?.length){ l.push('\n行项目:'); x.r.items.forEach((it,j)=>l.push(`${j+1}. ${it.item||'-'} ×${it.qty||'-'} @${it.unitPrice||'-'} =${it.subtotal||'-'}`)); }
  navigator.clipboard.writeText(l.join('\n'));
}

function histDel(i){
  if(!confirm('删除这条记录？')) return;
  const h=getHist(); h.splice(i,1); saveHist(h); HIST_OPEN.delete(i); render();
}

async function histSendFeishu(i){
  const h=getHist(); const x=h[i]; if(!x) return;
  const btn=document.getElementById('hbtn-'+i);
  const msgEl=document.getElementById('hmsg-'+i);
  if(btn) btn.disabled=true;
  if(msgEl) msgEl.innerHTML='<div class="notice warn" style="margin-top:8px">⏳ 发送中...</div>';
  const ck=x.t==='ship_out'?'ship_in':x.t;
  const fs=cfg.fs||{};
  const fc=fs[ck];
  if(!fs.aid||!fs.as||!fc?.at||!fc?.tid){
    if(msgEl) msgEl.innerHTML=`<div class="notice fail" style="margin-top:8px">❌ 请先在配置页填写飞书信息</div>`;
    if(btn) btn.disabled=false; return;
  }
  try{
    const fields={};
    FM[x.t].forEach(f=>{ const v=x.f?.[f.t]; if(v!==undefined&&v!==''){
      if(f.fs.includes('金额')||f.fs.includes('数量')||f.fs==='数量'){const n=parseFloat(String(v).replace(/[,¥$]/g,''));if(!isNaN(n))fields[f.fs]=n;}
      else fields[f.fs]=String(v);
    }});
    const wb=cfg.ocrUrl.replace(/\/+$/,'');
    const r=await fetch(wb+'/feishu',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({appId:fs.aid,appSecret:fs.as,appToken:fc.at,tableId:fc.tid,fields})});
    const cr=await r.json();
    if(cr.code===0){
      const rid=cr.data?.record?.record_id;
      h[i]={...h[i],rid}; saveHist(h);
      if(msgEl) msgEl.innerHTML=`<div class="notice ok" style="margin-top:8px">✅ 已写入飞书 · ${rid||''}</div>`;
      doSync();
    } else {
      if(msgEl) msgEl.innerHTML=`<div class="notice fail" style="margin-top:8px">❌ ${H(cr.msg||'写入失败')}</div>`;
    }
  }catch(e){
    if(msgEl) msgEl.innerHTML=`<div class="notice fail" style="margin-top:8px">❌ ${H(e.message)}</div>`;
  }
  if(btn) btn.disabled=false;
}

// Bind drag/paste events for scanner dropzone
function bindScannerEvents(){
  const dz = document.getElementById('dz');
  if(!dz) return;
  dz.addEventListener('dragover', e=>{e.preventDefault();SC.drag=true;dz.classList.add('drag')});
  dz.addEventListener('dragleave', ()=>{SC.drag=false;dz.classList.remove('drag')});
  dz.addEventListener('drop', e=>{e.preventDefault();SC.drag=false;dz.classList.remove('drag');if(e.dataTransfer.files[0])pickFile(e.dataTransfer.files[0])});
}

// Global paste
document.addEventListener('paste', e=>{
  if(tab!=='scanner') return;
  const items=e.clipboardData?.items;
  if(!items) return;
  for(let i=0;i<items.length;i++) if(items[i].type.startsWith('image/')){
    e.preventDefault();
    const b=items[i].getAsFile();
    if(b) pickFile(new File([b],`paste-${Date.now()}.png`,{type:b.type}));
    return;
  }
});

function pickFile(f){
  if(!f) return;
  SC.file=f; SC.result=null; SC.target=null; SC.mapping=null; SC.msg=null;
  if(f.type.startsWith('image/')){
    const r=new FileReader();
    r.onload=e=>{SC.preview=e.target.result;render()};
    r.readAsDataURL(f);
  } else { SC.preview=null; render(); }
}

/* ══════════════════════════════════════════════
   PAGE: ORDERS
══════════════════════════════════════════════ */
function pgOrd(){
  const tot=DB.productionOrders.reduce((s,o)=>s+N(o.amount),0);
  const paid=DB.productionOrders.reduce((s,o)=>s+N(o.paidAmount),0);
  const act=DB.productionOrders.filter(o=>o.status!=='已完成'&&o.status!=='已取消').length;
  const fil=ordF==='all'?DB.productionOrders:DB.productionOrders.filter(o=>(o.source||'手动')===ordF);
  return `<div class="phdr"><div class="pt">📦 下单 · 出货 · 付款跟进</div><div class="ps">点击订单行展开品项和出货记录</div></div>
  <div class="g3">${kpi('订单总额','¥'+F(tot),'','var(--amt-total)')}${kpi('已付金额','¥'+F(paid),'','var(--amt-paid)')}${kpi('待付金额','¥'+F(tot-paid),'进行中'+act+'单','var(--amt-due)')}</div>
  <div class="sec">
    <div class="pills">${['all','Zoho','手动','供应商','供应商下单','客户'].map(f=>`<button class="pill${ordF===f?' on':''}" onclick="ordF='${f}';render()">${f==='all'?'全部':f}<span style="opacity:.5;font-size:12.5px;margin-left:3px">(${f==='all'?DB.productionOrders.length:DB.productionOrders.filter(o=>(o.source||'手动')===f).length})</span></button>`).join('')}</div>
    <div class="card"><div class="tw"><table><thead><tr><th>订单号</th><th>来源</th><th>SKU/产品</th><th>描述/规格</th><th>数量</th><th>总金额</th><th>已付</th><th>待付</th><th>生产状态</th><th>付款状态</th></tr></thead><tbody>${prodTable(fil,'po')}</tbody></table></div></div>
  </div>`;
}

/* ══════════════════════════════════════════════
   PAGE: B2B
══════════════════════════════════════════════ */
function pgB2B(){
  const tot=DB.bOrders.reduce((s,o)=>s+N(o.amount),0);
  const paid=DB.bOrders.reduce((s,o)=>s+N(o.paidAmount),0);
  const msr=DB.bOrders.filter(o=>o.orderType==='月度报告').reduce((s,o)=>s+N(o.amount),0);
  const inv=DB.invoices.reduce((s,i)=>s+N(i.amount),0);
  const invH=`<div class="tw"><table><thead><tr><th>发票号</th><th>客户</th><th>开票金额</th><th>币种</th><th>状态</th><th>关联订单</th><th>备注</th></tr></thead><tbody>${DB.invoices.length===0?'<tr><td class="empty" colspan="7">暂无开票记录</td></tr>':DB.invoices.map(i=>`<tr><td class="cod fw8 nw" style="color:var(--blue)">${H(i.invoiceNo||'-')}</td><td class="fw6">${H(i.customer||'-')}</td><td class="amt fw8" style="color:var(--amt-total)">¥${F(i.amount)}</td><td>${H(i.currency||'-')}</td><td>${bdg(i.status)}</td><td class="cod nw">${H(i.relatedOrder||'-')}</td><td class="wrap" style="color:var(--t3)">${H(i.notes||'-')}</td></tr>`).join('')}</tbody></table></div>`;
  return `<div class="phdr"><div class="pt">🤝 B端客户履约</div><div class="ps">点击展开品项和出货明细 · MSR = Monthly Sales Report</div></div>
  <div class="g4">${kpi('订单总额','¥'+F(tot),'','var(--amt-total)')}${kpi('已收款','¥'+F(paid),'','var(--amt-paid)')}${kpi('待收款','¥'+F(tot-paid),'','var(--amt-due)')}${kpi('月报收入','¥'+F(msr),'已开票 ¥'+F(inv),'var(--teal)')}</div>
  <div class="sec"><div class="card"><div class="stabs"><button class="stab${b2T==='ord'?' on':''}" onclick="b2T='ord';render()">📋 B端订单</button><button class="stab${b2T==='inv'?' on':''}" onclick="b2T='inv';render()">🧾 开票记录</button></div><div>${b2T==='ord'?`<div class="tw"><table><thead><tr><th>订单号</th><th>类型</th><th>来源</th><th>客户</th><th>SKU/产品</th><th>描述/报告期</th><th>总金额</th><th>已收</th><th>待收</th><th>付款</th><th>开票</th></tr></thead><tbody>${bTable(DB.bOrders,'bo')}</tbody></table></div>`:invH}</div></div></div>`;
}

/* ══════════════════════════════════════════════
   PAGE: SETTINGS
══════════════════════════════════════════════ */
function pgSet(){
  const fs = cfg.fs || {};
  const tblRows=[['产品',DB.products.length,'var(--blue)'],['生产订单',DB.productionOrders.length,'var(--orange)'],['B端订单',DB.bOrders.length,'var(--amt-total)'],['垫付',DB.advances.length,'var(--red)'],['出货',DB.shipments.length,'var(--purple)'],['开票',DB.invoices.length,'var(--green)']];
  const FTABLES=[{key:'production',label:'📦 生产订单',tid:'tblyUdlkUkAGiJwo'},{key:'b2b',label:'🤝 B端订单',tid:'tbl1vDHZlSKGBeI7'},{key:'ship_in',label:'📥📤 出货记录（收货+发货共用）',tid:'tbl5tQRwRLchLiL8'},{key:'advance',label:'💰 垫付款',tid:'tbl7FGIDEtkZBid8'},{key:'invoice',label:'🧾 开票',tid:'tbl9EmtJeZ7enX5b'}];
  return `
  <div class="phdr"><div class="pt">⚙ 配置</div><div class="ps">Worker · 飞书连接 · 数据状态</div></div>

  <div class="cfg-section">
    <div class="cfg-title">🔌 Worker 连接</div>
    <div style="margin-bottom:12px">
      <label class="fl">看板数据 Worker URL <span style="color:var(--t4);font-weight:400;text-transform:none">(读飞书数据)</span></label>
      <input id="ci" class="fi" value="${H(cfg.workerUrl)}">
    </div>
    <div style="margin-bottom:16px">
      <label class="fl">OCR Worker URL <span style="color:var(--t4);font-weight:400;text-transform:none">(识别单据 + 写入飞书，就是原来的 ocr-tool.zhenita.workers.dev)</span></label>
      <input id="ci2" class="fi" value="${H(cfg.ocrUrl||cfg.workerUrl)}">
    </div>
    <button class="btn btn-primary" onclick="cfg.workerUrl=document.getElementById('ci').value.trim().replace(/\\/$/,'');cfg.ocrUrl=document.getElementById('ci2').value.trim().replace(/\\/$/,'');saveC();doSync()">保存并重新同步</button>
    <div style="margin-top:14px;font-size:13px;color:var(--t3)">
      字段诊断: <a href="${H(cfg.workerUrl)}/api/raw?table=productionOrders" target="_blank" style="color:var(--blue)">/api/raw?table=productionOrders</a>
    </div>
  </div>

  <div class="cfg-section">
    <div class="cfg-title">🔑 飞书连接（扫描写入用）</div>
    <div style="font-size:13px;color:var(--t3);margin-bottom:14px;line-height:1.7">
      App ID/Secret 在 <a href="https://open.feishu.cn" target="_blank" style="color:var(--blue)">open.feishu.cn</a> 创建应用后获取<br>
      每张表的 App Token 和 Table ID 从飞书 URL 复制：<code style="background:var(--bg2);padding:1px 6px;border-radius:4px">/base/<b>[appToken]</b>?table=<b>[tableId]</b></code>
    </div>
    <div class="g2" style="margin-bottom:16px">
      <div><label class="fl">App ID</label><input class="fi" value="${H(fs.aid||'cli_a922cf9adef8dbc6')}" onchange="cfg.fs={...cfg.fs||{},aid:this.value};saveC()"></div>
      <div><label class="fl">App Secret</label><input class="fi" type="password" value="${H(fs.as||'GJz3kXbHMoxOkyotIQC61eJnB6lAQoGG')}" onchange="cfg.fs={...cfg.fs||{},as:this.value};saveC()"></div>
    </div>
    ${FTABLES.map(t=>`
    <div style="border-left:3px solid var(--accent);padding:10px 14px;margin-bottom:10px;border-radius:0 var(--rx) var(--rx) 0;background:var(--bg2)">
      <div style="font-size:13px;font-weight:700;margin-bottom:8px">${t.label}</div>
      <div class="g2">
        <div><label class="fl">App Token</label><input class="fi fi-sm" value="${H(fs[t.key]?.at||'R9HBwFnARifUbQkQ54NcdASLnrc')}" onchange="cfg.fs={...cfg.fs||{},[t.key]:{...cfg.fs?.[t.key]||{},at:this.value}};saveC()" placeholder="R9HBwFnARifUbQkQ54NcdASLnrc"></div>
        <div><label class="fl">Table ID <span style="color:var(--t4);font-weight:400">(预填)</span></label><input class="fi fi-sm" value="${H(fs[t.key]?.tid||t.tid)}" onchange="cfg.fs={...cfg.fs||{},[t.key]:{...cfg.fs?.[t.key]||{},tid:this.value}};saveC()"></div>
      </div>
    </div>`).join('')}
  </div>

  <div class="cfg-section">
    <div class="cfg-title">📊 数据状态</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px">
      ${tblRows.map(([l,v,c])=>`<div style="background:var(--bg2);border-radius:var(--rs);padding:14px 16px;border:1px solid var(--border)"><div style="font-size:12px;font-weight:600;color:var(--t3)">${l}</div><div style="font-size:28px;font-weight:800;color:${c};margin-top:5px">${v}</div></div>`).join('')}
    </div>
    <div style="font-size:13px;color:var(--t4)">上次同步：${lastSync?lastSync.toLocaleString('zh-CN'):'从未'}</div>
  </div>

  <div class="cfg-section">
    <div class="cfg-title">🌐 发布方式</div>
    <div style="font-size:14px;color:var(--t2);line-height:2">
      此文件可直接本地双击打开使用（数据从飞书实时读取）<br>
      如需团队共享访问，上传到：<br>
      · <strong>Cloudflare Pages</strong> — 拖放上传，免费，推荐<br>
      · <strong>Netlify</strong> — netlify.com → Drop a file<br>
      · <strong>GitHub Pages</strong> — 放入仓库 main 分支
    </div>
  </div>`;
}

/* ══════════════════════════════════════════════
   INIT
══════════════════════════════════════════════ */
document.getElementById('d-date').textContent = new Date().toLocaleDateString('zh-CN', {month:'long',day:'numeric',weekday:'short'});
// Pre-fill feishu table IDs if not set
if (!cfg.fs) cfg.fs = {};
const DEFAULT_FS = {
  production: { at: 'R9HBwFnARifUbQkQ54NcdASLnrc', tid: 'tblyUdlkUkAGiJwo' },
  b2b:        { at: 'R9HBwFnARifUbQkQ54NcdASLnrc', tid: 'tbl1vDHZlSKGBeI7' },
  ship_in:    { at: 'R9HBwFnARifUbQkQ54NcdASLnrc', tid: 'tbl5tQRwRLchLiL8' },
  advance:    { at: 'R9HBwFnARifUbQkQ54NcdASLnrc', tid: 'tbl7FGIDEtkZBid8' },
  invoice:    { at: 'R9HBwFnARifUbQkQ54NcdASLnrc', tid: 'tbl9EmtJeZ7enX5b' },
};
Object.entries(DEFAULT_FS).forEach(([k,v])=>{ if(!cfg.fs[k]) cfg.fs[k]=v; });
if (!cfg.fs.aid) cfg.fs.aid = 'cli_a922cf9adef8dbc6';
if (!cfg.fs.as) cfg.fs.as = 'GJz3kXbHMoxOkyotIQC61eJnB6lAQoGG';
saveC();

renderNav();
render();
doSync();
</script>
</body>
