<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N7R 单据提取</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🧾</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'JetBrains Mono','Noto Sans SC',monospace;background:#0B0E14;color:#E2E8F0}
  ::-webkit-scrollbar{width:6px;height:6px}
  ::-webkit-scrollbar-thumb{background:#252B3B;border-radius:3px}
  input,select,textarea{outline:none}
  input:focus,textarea:focus{border-color:#E8B931!important}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;
const LS={get:k=>{try{return JSON.parse(localStorage.getItem(k))}catch{return null}},set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v))}catch{}}};
const C={bg:"#0B0E14",card:"#181D28",border:"#252B3B",accent:"#E8B931",blue:"#3B82F6",green:"#34D399",red:"#EF4444",purple:"#A78BFA",orange:"#F59E0B",text:"#E2E8F0",dim:"#64748B",muted:"#475569"};
const TABLES=[
  {key:"production",label:"📦 生产订单",color:C.blue,desc:"采购单/报价单"},
  {key:"b2b",label:"🤝 B端订单",color:C.green,desc:"客户订单/合同"},
  {key:"shipping",label:"🚚 出货记录",color:C.orange,desc:"送货单"},
  {key:"advance",label:"💰 垫付款",color:C.purple,desc:"付款凭证"},
  {key:"invoice",label:"🧾 开票",color:C.red,desc:"发票"},
];
const FM={
  production:[{f:"supplier",t:"供应商",fs:"供应商"},{f:"date",t:"下单日期",fs:"下单日期"},{f:"docNo",t:"订单编号",fs:"订单编号"},{f:"items",t:"产品名称",fs:"产品名称"},{f:"totalQty",t:"下单数量",fs:"下单数量"},{f:"currency",t:"币种",fs:"币种"},{f:"total",t:"订单金额",fs:"订单金额"},{f:"payment",t:"备注",fs:"备注"},{f:"_auto",t:"来源",fs:"来源",v:"供应商下单"}],
  b2b:[{f:"supplier",t:"客户名称",fs:"客户名称"},{f:"date",t:"下单日期",fs:"下单日期"},{f:"docNo",t:"订单编号",fs:"订单编号"},{f:"items",t:"产品名称",fs:"产品名称"},{f:"totalQty",t:"数量",fs:"数量"},{f:"currency",t:"币种",fs:"币种"},{f:"total",t:"订单金额",fs:"订单金额"},{f:"_auto",t:"来源",fs:"来源",v:"客户下单"}],
  shipping:[{f:"date",t:"出货日期",fs:"出货日期"},{f:"docNo",t:"关联订单",fs:"关联生产订单"},{f:"totalQty",t:"出货数量",fs:"出货数量"},{f:"delivery",t:"物流单号",fs:"物流单号"},{f:"notes",t:"备注",fs:"备注"}],
  advance:[{f:"date",t:"日期",fs:"日期"},{f:"currency",t:"币种",fs:"币种"},{f:"total",t:"垫付金额",fs:"垫付金额"},{f:"notes",t:"用途说明",fs:"用途说明"},{f:"supplier",t:"付款对象",fs:"备注"},{f:"_auto",t:"还款状态",fs:"还款状态",v:"未还"}],
  invoice:[{f:"docNo",t:"发票号",fs:"发票号"},{f:"currency",t:"币种",fs:"币种"},{f:"total",t:"开票金额",fs:"开票金额"},{f:"supplier",t:"客户",fs:"客户名称"},{f:"date",t:"日期",fs:"备注"},{f:"_auto",t:"开票状态",fs:"开票状态",v:"已开票"}],
};
const S={
  card:{background:C.card,borderRadius:12,border:`1px solid ${C.border}`,padding:16,marginBottom:12},
  btn:(c=C.accent,o=false)=>({padding:"10px 20px",borderRadius:8,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit",border:o?`1px solid ${c}55`:"none",background:o?"transparent":c,color:o?c:(c===C.accent?"#0B0E14":"#fff")}),
  btnSm:c=>({padding:"5px 12px",borderRadius:6,fontSize:11,fontWeight:600,cursor:"pointer",fontFamily:"inherit",background:`${c}18`,color:c,border:`1px solid ${c}33`}),
  input:{padding:"9px 12px",background:C.bg,border:`1px solid ${C.border}`,borderRadius:8,color:C.text,fontSize:13,fontFamily:"inherit",width:"100%",boxSizing:"border-box"},
  label:{fontSize:10,color:C.dim,marginBottom:3,display:"block",textTransform:"uppercase",letterSpacing:0.5},
  badge:c=>({display:"inline-block",padding:"2px 8px",borderRadius:20,fontSize:10,fontWeight:600,background:`${c}20`,color:c}),
  th:{padding:"6px 10px",textAlign:"left",fontSize:10,color:C.dim,textTransform:"uppercase",borderBottom:`1px solid ${C.border}`},
  td:{padding:"6px 10px",borderBottom:`1px solid ${C.border}15`,fontSize:12},
};

function App(){
  const[tab,setTab]=useState("extract");
  const[cfg,setCfg]=useState(()=>LS.get("n7r-cfg")||{url:"",fs:{}});
  const[file,setFile]=useState(null);
  const[prev,setPrev]=useState(null);
  const[busy,setBusy]=useState(false);
  const[res,setRes]=useState(null);
  const[tgt,setTgt]=useState(null);
  const[mp,setMp]=useState(null);
  const[saving,setSaving]=useState(false);
  const[msg,setMsg]=useState(null);
  const[hist,setHist]=useState(()=>LS.get("n7r-hist")||[]);
  const[drag,setDrag]=useState(false);
  const ref=useRef();

  const sc=c=>{setCfg(c);LS.set("n7r-cfg",c)};
  const sh=h=>{const t=h.slice(0,50);setHist(t);LS.set("n7r-hist",t)};

  const pick=f=>{if(!f)return;setFile(f);setRes(null);setTgt(null);setMp(null);setMsg(null);
    if(f.type.startsWith("image/")){const r=new FileReader();r.onload=e=>setPrev(e.target.result);r.readAsDataURL(f)}else setPrev(null)};

  useEffect(()=>{
    const fn=e=>{const it=e.clipboardData?.items;if(!it)return;
      for(let i=0;i<it.length;i++)if(it[i].type.startsWith("image/")){e.preventDefault();const b=it[i].getAsFile();if(b)pick(new File([b],`paste-${Date.now()}.png`,{type:b.type}));return}};
    document.addEventListener("paste",fn);return()=>document.removeEventListener("paste",fn)},[]);

  const compress=f=>new Promise(r=>{const cv=document.createElement("canvas"),im=new Image();
    im.onload=()=>{const s=Math.min(1,1600/im.width);cv.width=im.width*s;cv.height=im.height*s;cv.getContext("2d").drawImage(im,0,0,cv.width,cv.height);cv.toBlob(b=>r(b),"image/jpeg",0.85)};im.src=URL.createObjectURL(f)});

  const extract=async()=>{
    if(!file||!cfg.url)return;setBusy(true);setRes(null);setMsg(null);
    try{const fd=new FormData();
      if(file.type.startsWith("image/")&&file.size>1e6)fd.append("file",await compress(file),file.name);else fd.append("file",file);
      const r=await fetch(cfg.url,{method:"POST",body:fd});const d=await r.json();setRes(d);detect(d);
    }catch(e){setRes({error:e.message})}setBusy(false)};

  const detect=d=>{if(!d||d.error)return;const t=JSON.stringify(d).toLowerCase();
    if(t.includes("送货单")||t.includes("delivery note")||t.includes("出货单")||t.includes("packing list"))return doMap("shipping",d);
    if((t.includes("付款")||t.includes("转账")||t.includes("垫付")||t.includes("代付")||t.includes("汇款"))&&!t.includes("付款条件")&&!t.includes("payment term"))return doMap("advance",d);
    if((t.includes("发票")||t.includes("tax invoice")||t.includes("增值税"))&&!t.includes("proforma"))return doMap("invoice",d);
    if(t.includes("sales contract")||t.includes("销售合同")||t.includes("sales order")||t.includes("客户订单")||t.includes("contract")||t.includes("合同")||t.includes("order confirmation")||t.includes("订单确认"))return doMap("b2b",d);
    if(t.includes("purchase order")||t.includes("采购")||t.includes("报价")||t.includes("quotation")||t.includes("proforma"))return doMap("production",d);
    setTgt(null);setMp(null)};

  const doMap=(key,data)=>{data=data||res;setTgt(key);if(!data||data.error)return;
    const m={};FM[key].forEach(f=>{
      if(f.f==="_auto")m[f.t]=f.v;
      else if(f.f==="items"&&data.items)m[f.t]=data.items.map(i=>i.item||i.name||i.sku||"").filter(Boolean).join(", ");
      else if(f.f==="totalQty"&&data.items)m[f.t]=data.items.reduce((s,i)=>s+(parseFloat(i.qty)||0),0);
      else if(data.header?.[f.f]!==undefined)m[f.t]=data.header[f.f];
      else if(data[f.f]!==undefined)m[f.t]=data[f.f];
      else m[f.t]=""});setMp(m)};

  const toFeishu=async()=>{
    const fc=cfg.fs?.[tgt],aid=cfg.fs?.aid,as=cfg.fs?.as;
    if(!aid||!as||!fc?.at||!fc?.tid){setMsg({e:`请先配置飞书连接`});return}
    if(!cfg.url){setMsg({e:`请先配置Worker URL`});return}
    setSaving(true);setMsg(null);
    try{
      const fields={};FM[tgt].forEach(f=>{if(mp[f.t]!==undefined&&mp[f.t]!==""){
        if(f.fs.includes("金额")||f.fs.includes("数量")||f.fs==="数量"){const n=parseFloat(String(mp[f.t]).replace(/[,¥$]/g,""));if(!isNaN(n))fields[f.fs]=n}
        else fields[f.fs]=String(mp[f.t])}});
      const workerBase=cfg.url.replace(/\/+$/,"");
      const cr=await(await fetch(workerBase+"/feishu",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({appId:aid,appSecret:as,appToken:fc.at,tableId:fc.tid,fields})})).json();
      if(cr.code===0){const rid=cr.data?.record?.record_id;setMsg({ok:rid});sh([{d:new Date().toISOString(),t:tgt,f:mp,r:res,rid},...hist])}
      else setMsg({e:cr.msg||"飞书写入失败"});
    }catch(e){setMsg({e:e.message})}setSaving(false)};

  const localSave=()=>{sh([{d:new Date().toISOString(),t:tgt,f:mp,r:res},...hist]);setMsg({ok:"本地"})};

  return <div style={{maxWidth:680,margin:"0 auto",padding:"0 16px 80px",minHeight:"100vh"}}>
    <header style={{padding:"14px 0",borderBottom:`1px solid ${C.border}`,marginBottom:12,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div><div style={{fontSize:17,fontWeight:800,color:C.accent}}>N7R · 单据提取</div><div style={{fontSize:10,color:C.dim,marginTop:2}}>AI识别 → 写入飞书</div></div>
      {cfg.url&&<span style={{fontSize:10,color:C.green}}>● 已连接</span>}
    </header>

    <div style={{display:"flex",gap:0,borderBottom:`1px solid ${C.border}`,marginBottom:12}}>
      {[{k:"extract",l:"📄 识别"},{k:"history",l:`🗂 历史(${hist.length})`},{k:"config",l:"⚙️ 配置"}].map(t=>
        <div key={t.k} style={{padding:"10px 16px",fontSize:12,fontWeight:tab===t.k?700:500,cursor:"pointer",color:tab===t.k?C.accent:C.dim,borderBottom:tab===t.k?`2px solid ${C.accent}`:"2px solid transparent"}} onClick={()=>setTab(t.k)}>{t.l}</div>)}
    </div>

    {/* ═══ EXTRACT ═══ */}
    {tab==="extract"&&<div>
      {!cfg.url&&<div style={{...S.card,padding:"10px 14px",display:"flex",gap:8,alignItems:"center",borderColor:`${C.orange}44`}}>
        <span style={{fontSize:11,color:C.orange}}>Worker:</span>
        <input style={{...S.input,flex:1}} value={cfg.url} onChange={e=>sc({...cfg,url:e.target.value})} placeholder="https://xxx.workers.dev" />
      </div>}

      <div style={S.card}>
        <div style={{display:"flex",gap:12}}>
          <div style={{flex:1,border:`2px dashed ${drag?C.accent:C.border}`,borderRadius:10,padding:"20px 16px",textAlign:"center",cursor:"pointer",background:drag?`${C.accent}08`:"transparent",display:"flex",flexDirection:"column",justifyContent:"center",alignItems:"center",minHeight:100}}
            onClick={()=>ref.current?.click()} onDragOver={e=>{e.preventDefault();setDrag(true)}} onDragLeave={()=>setDrag(false)} onDrop={e=>{e.preventDefault();setDrag(false);if(e.dataTransfer.files[0])pick(e.dataTransfer.files[0])}}>
            <input ref={ref} type="file" accept="image/*,application/pdf" style={{display:"none"}} onChange={e=>pick(e.target.files[0])} />
            {file?<><div style={{fontSize:13,fontWeight:600,wordBreak:"break-all"}}>{file.name}</div><div style={{fontSize:10,color:C.dim,marginTop:3}}>点击重选</div></>
              :<><div style={{fontSize:26,marginBottom:4}}>📄</div><div style={{fontSize:12,color:C.dim}}>点击、拖拽或 <b>Ctrl+V</b></div></>}
          </div>
          {prev&&<div style={{width:100,flexShrink:0,borderRadius:8,overflow:"hidden",border:`1px solid ${C.border}`}}><img src={prev} style={{width:"100%",height:"100%",objectFit:"cover"}} /></div>}
        </div>
        {file&&<button style={{...S.btn(),width:"100%",marginTop:10,opacity:busy?0.6:1}} onClick={extract} disabled={busy||!cfg.url}>{busy?"⏳ 识别中...":"✨ 开始识别"}</button>}
      </div>

      {res&&!res.error&&<>
        <div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontWeight:700,fontSize:13}}>📋 识别结果</span><span style={S.badge(C.green)}>✓</span></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:5}}>
            {res.header&&Object.entries(res.header).filter(([_,v])=>v).map(([k,v])=>
              <div key={k} style={{padding:"5px 8px",background:C.bg,borderRadius:6,border:`1px solid ${C.border}`}}>
                <div style={{fontSize:9,color:C.dim}}>{k}</div><div style={{fontSize:12,fontWeight:600}}>{v}</div></div>)}
          </div>
          {res.items?.length>0&&<table style={{width:"100%",borderCollapse:"collapse",marginTop:8}}>
            <thead><tr><th style={S.th}>产品</th><th style={S.th}>数量</th><th style={S.th}>单价</th><th style={S.th}>小计</th></tr></thead>
            <tbody>{res.items.map((it,i)=><tr key={i}><td style={S.td}>{it.item||it.name||"-"}</td><td style={S.td}>{it.qty||"-"}</td><td style={S.td}>{it.unitPrice||it.price||"-"}</td><td style={{...S.td,color:C.accent}}>{it.subtotal||it.amount||"-"}</td></tr>)}</tbody>
          </table>}
        </div>

        <div style={S.card}>
          <div style={{fontSize:13,fontWeight:700,marginBottom:8}}>🎯 目标表 {tgt?<span style={{fontSize:10,color:C.green,fontWeight:400}}>可切换</span>:<span style={{fontSize:10,color:C.orange,fontWeight:400}}>请选择</span>}</div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {TABLES.map(t=><div key={t.key} onClick={()=>doMap(t.key)} style={{padding:"8px 12px",borderRadius:8,cursor:"pointer",border:`2px solid ${tgt===t.key?t.color:C.border}`,background:tgt===t.key?`${t.color}12`:"transparent"}}>
              <span style={{fontSize:12,fontWeight:700,color:t.color}}>{t.label}</span></div>)}
          </div>
        </div>

        {tgt&&mp&&<div style={S.card}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}>
            <span style={{fontWeight:700,fontSize:13}}>🔗 映射</span>
            <button style={S.btnSm(C.blue)} onClick={()=>{navigator.clipboard.writeText(Object.entries(mp).map(([k,v])=>`${k}:${v}`).join("\n"))}}>复制</button>
          </div>
          {Object.entries(mp).map(([k,v])=><div key={k} style={{display:"grid",gridTemplateColumns:"90px 1fr",gap:8,marginBottom:5,alignItems:"center"}}>
            <div style={{fontSize:11,color:C.dim,fontWeight:600}}>{k}</div>
            <input style={S.input} value={v} onChange={e=>setMp(p=>({...p,[k]:e.target.value}))} />
          </div>)}
          <div style={{display:"flex",gap:8,marginTop:12}}>
            <button style={{...S.btn(C.green),flex:1,opacity:saving?0.6:1}} onClick={toFeishu} disabled={saving}>{saving?"⏳":"🪁 写入飞书"}</button>
            <button style={S.btn(C.dim,true)} onClick={localSave}>💾 保存</button>
          </div>
          {msg&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:8,fontSize:12,background:msg.ok?`${C.green}15`:`${C.red}15`,color:msg.ok?C.green:C.red}}>{msg.ok?`✅ ${msg.ok}`:`❌ ${msg.e}`}</div>}
        </div>}
      </>}
      {res?.error&&<div style={{...S.card,borderColor:`${C.red}44`}}><span style={{color:C.red,fontSize:13}}>❌ {res.error}</span></div>}
    </div>}

    {/* ═══ HISTORY ═══ */}
    {tab==="history"&&<HistTab h={hist} sh={sh} />}

    {/* ═══ CONFIG ═══ */}
    {tab==="config"&&<div>
      <div style={{...S.card,borderColor:`${C.accent}33`,padding:14}}>
        <div style={{fontSize:11,color:C.dim,lineHeight:1.8}}><b style={{color:C.accent}}>配置说明</b><br/>App ID/Secret: open.feishu.cn 创建应用<br/>每张表: 从飞书URL复制 appToken 和 tableId<br/>格式: /base/<b>[appToken]</b>?table=<b>[tableId]</b></div>
      </div>
      <div style={S.card}>
        <div style={{fontWeight:700,fontSize:13,marginBottom:8}}>🔑 全局</div>
        <div style={{marginBottom:8}}><div style={S.label}>Worker URL</div><input style={S.input} value={cfg.url} onChange={e=>sc({...cfg,url:e.target.value})} /></div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><div style={S.label}>App ID</div><input style={S.input} value={cfg.fs?.aid||""} onChange={e=>sc({...cfg,fs:{...cfg.fs,aid:e.target.value}})} /></div>
          <div><div style={S.label}>App Secret</div><input style={S.input} type="password" value={cfg.fs?.as||""} onChange={e=>sc({...cfg,fs:{...cfg.fs,as:e.target.value}})} /></div>
        </div>
      </div>
      {TABLES.map(t=><div key={t.key} style={{...S.card,borderLeft:`3px solid ${t.color}`,padding:12}}>
        <div style={{fontWeight:700,color:t.color,fontSize:12,marginBottom:6}}>{t.label}</div>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><div style={S.label}>App Token</div><input style={S.input} value={cfg.fs?.[t.key]?.at||""} onChange={e=>sc({...cfg,fs:{...cfg.fs,[t.key]:{...cfg.fs?.[t.key],at:e.target.value}}})} /></div>
          <div><div style={S.label}>Table ID</div><input style={S.input} value={cfg.fs?.[t.key]?.tid||""} onChange={e=>sc({...cfg,fs:{...cfg.fs,[t.key]:{...cfg.fs?.[t.key],tid:e.target.value}}})} /></div>
        </div>
      </div>)}
    </div>}
  </div>;
}

function HistTab({h,sh}){
  const[open,setOpen]=useState(null);
  const[sending,setSending]=useState(null);
  const[sendMsg,setSendMsg]=useState({});

  if(!h.length)return<div style={{...S.card,textAlign:"center",padding:40,color:C.muted}}>暂无记录</div>;

  const copy=x=>{const l=[];Object.entries(x.f||{}).forEach(([k,v])=>{if(v)l.push(`${k}: ${v}`)});
    if(x.r?.items?.length){l.push("\n行项目:");x.r.items.forEach((it,j)=>l.push(`${j+1}. ${it.item||"-"} ×${it.qty||"-"} @${it.unitPrice||"-"} =${it.subtotal||"-"}`))}
    navigator.clipboard.writeText(l.join("\n"))};

  const sendToFeishu=async(x,i)=>{
    const cfg=LS.get("n7r-cfg");
    if(!cfg?.url||!cfg?.fs?.aid||!cfg?.fs?.as){setSendMsg({...sendMsg,[i]:{e:"请先在配置页填写Worker URL和飞书信息"}});return}
    const fc=cfg.fs?.[x.t];
    if(!fc?.at||!fc?.tid){setSendMsg({...sendMsg,[i]:{e:`请先配置 ${TABLES.find(t=>t.key===x.t)?.label||x.t} 的飞书连接`}});return}
    setSending(i);setSendMsg({...sendMsg,[i]:null});
    try{
      const fields={};FM[x.t].forEach(f=>{const v=x.f?.[f.t];if(v!==undefined&&v!==""){
        if(f.fs.includes("金额")||f.fs.includes("数量")||f.fs==="数量"){const n=parseFloat(String(v).replace(/[,¥$]/g,""));if(!isNaN(n))fields[f.fs]=n}
        else fields[f.fs]=String(v)}});
      const cr=await(await fetch(cfg.url.replace(/\/+$/,"")+"/feishu",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({appId:cfg.fs.aid,appSecret:cfg.fs.as,appToken:fc.at,tableId:fc.tid,fields})})).json();
      if(cr.code===0){
        const rid=cr.data?.record?.record_id;
        setSendMsg({...sendMsg,[i]:{ok:rid}});
        // Update history entry with record id
        const newH=[...h];newH[i]={...newH[i],rid};sh(newH);
      }else setSendMsg({...sendMsg,[i]:{e:cr.msg||"写入失败"}});
    }catch(e){setSendMsg({...sendMsg,[i]:{e:e.message}})}
    setSending(null)};

  return<div>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
      <span style={{fontSize:13,fontWeight:700}}>{h.length} 条记录 <span style={{fontWeight:400,fontSize:11,color:C.dim}}>点击展开</span></span>
      <button style={S.btnSm(C.red)} onClick={()=>{if(confirm("清空？"))sh([])}}>清空</button>
    </div>
    {h.map((x,i)=>{
      const tbl=TABLES.find(t=>t.key===x.t);const isO=open===i;const synced=x.rid&&x.rid!=="本地";
      return<div key={i} style={{...S.card,borderLeft:`3px solid ${tbl?.color||C.dim}`,padding:isO?16:12,cursor:"pointer"}} onClick={()=>setOpen(isO?null:i)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{color:C.dim,fontSize:11}}>{isO?"▼":"▶"}</span>
            <span style={S.badge(tbl?.color||C.dim)}>{tbl?.label||x.t}</span>
            {synced?<span style={S.badge(C.green)}>飞书</span>:<span style={S.badge(C.muted)}>本地</span>}
          </div>
          <span style={{fontSize:10,color:C.dim}}>{new Date(x.d).toLocaleString("zh-CN",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"})}</span>
        </div>
        {!isO&&<div style={{fontSize:11,color:C.dim,marginTop:4,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
          {Object.entries(x.f||{}).filter(([_,v])=>v).slice(0,4).map(([k,v])=>`${k}:${v}`).join(" · ")}</div>}

        {isO&&<div style={{marginTop:12}} onClick={e=>e.stopPropagation()}>
          <div style={{fontSize:11,fontWeight:700,color:C.accent,marginBottom:6}}>映射字段</div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:4,marginBottom:12}}>
            {Object.entries(x.f||{}).map(([k,v])=>
              <div key={k} style={{padding:"4px 8px",background:C.bg,borderRadius:4,border:`1px solid ${C.border}`}}>
                <span style={{fontSize:9,color:C.dim}}>{k}: </span><span style={{fontSize:12,fontWeight:600,color:v?C.text:C.muted}}>{v||"(空)"}</span></div>)}
          </div>

          {x.r?.header&&<div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:C.blue,marginBottom:6}}>原始识别</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:4}}>
              {Object.entries(x.r.header).filter(([_,v])=>v).map(([k,v])=>
                <div key={k} style={{padding:"3px 8px",background:`${C.blue}08`,borderRadius:4}}><span style={{fontSize:9,color:C.dim}}>{k}: </span><span style={{fontSize:11}}>{v}</span></div>)}
            </div>
          </div>}

          {x.r?.items?.length>0&&<div style={{marginBottom:12}}>
            <div style={{fontSize:11,fontWeight:700,color:C.orange,marginBottom:6}}>行项目 ({x.r.items.length})</div>
            <table style={{width:"100%",borderCollapse:"collapse"}}>
              <thead><tr><th style={S.th}>产品</th><th style={S.th}>数量</th><th style={S.th}>单价</th><th style={S.th}>小计</th></tr></thead>
              <tbody>{x.r.items.map((it,j)=><tr key={j}><td style={S.td}>{it.item||it.name||"-"}</td><td style={S.td}>{it.qty||"-"}</td><td style={S.td}>{it.unitPrice||it.price||"-"}</td><td style={{...S.td,color:C.accent}}>{it.subtotal||it.amount||"-"}</td></tr>)}</tbody>
            </table>
          </div>}

          {synced&&<div style={{fontSize:10,color:C.dim,marginBottom:8}}>Record: <code>{x.rid}</code></div>}
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {!synced&&<button style={S.btnSm(C.green)} onClick={()=>sendToFeishu(x,i)} disabled={sending===i}>{sending===i?"⏳":"🪁 发到飞书"}</button>}
            {synced&&<button style={S.btnSm(C.green)} onClick={()=>sendToFeishu(x,i)} disabled={sending===i}>{sending===i?"⏳":"🪁 重新发送"}</button>}
            <button style={S.btnSm(C.blue)} onClick={()=>copy(x)}>📋 复制</button>
            <button style={S.btnSm(C.red)} onClick={e=>{e.stopPropagation();if(confirm("删除？"))sh(h.filter((_,j)=>j!==i))}}>删除</button>
          </div>
          {sendMsg[i]&&<div style={{marginTop:6,padding:"6px 10px",borderRadius:6,fontSize:11,background:sendMsg[i].ok?`${C.green}15`:`${C.red}15`,color:sendMsg[i].ok?C.green:C.red}}>
            {sendMsg[i].ok?`✅ 已写入 ${sendMsg[i].ok}`:`❌ ${sendMsg[i].e}`}</div>}
        </div>}
      </div>;
    })}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
